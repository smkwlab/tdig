version: 2
updates:
  # Keep SHA-pinned third-party GitHub Actions up to date (Renovate here is
  # mix-only, so it does not manage Actions). Reusable workflows stay on @v1.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
