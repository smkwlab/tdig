# Release workflow for tdig
#
# Triggered on tag push matching X.Y.Z (no `v` prefix, consistent with
# the pre-existing 0.2.0 tag). Builds a Bakeware standalone binary for
# Linux x86_64 and macOS arm64, then attaches them to a GitHub Release.
#
# See Issue #49 for the design discussion and asset naming convention.

name: Release

on:
  push:
    tags:
      # Match numeric semver tags X.Y.Z. GitHub Actions tag filters
      # support `+` as "one or more of the preceding character" (see the
      # cheat sheet at
      # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet
      # which shows `v[12].[0-9]+.[0-9]+` matching `v1.0.2`). The extglob
      # form `+([0-9])` is NOT supported here and silently fails to
      # match real tags (verified empirically: tag `0.3.0` did not
      # trigger this workflow when the pattern was extglob).
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: tdig-linux-x86_64
            otp: '27.3.4.4'
            elixir: '1.17.3'
          - os: macos-latest
            asset_name: tdig-macos-arm64
            otp: '27.3.4.4'
            elixir: '1.17.3'

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache mix dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.exs') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify mix.exs version matches the tag
        # Refuse to release if mix.exs version diverges from the pushed tag,
        # which would leave `tdig --version` lying about the release.
        run: |
          MIX_VERSION=$(mix run --no-start -e 'IO.puts(Mix.Project.config()[:version])' | tail -n 1)
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "${MIX_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::mix.exs version (${MIX_VERSION}) does not match the tag (${TAG_VERSION})"
            exit 1
          fi
          echo "mix.exs version (${MIX_VERSION}) matches tag (${TAG_VERSION})"

      - name: Build Bakeware release
        env:
          MIX_ENV: prod
        run: mix release

      - name: Rename binary for asset upload
        run: |
          cp _build/prod/rel/bakeware/tdig "${{ matrix.asset_name }}"
          chmod +x "${{ matrix.asset_name }}"
          ls -lh "${{ matrix.asset_name }}"

      - name: Upload binary as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Collect binaries into a flat directory
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Generate SHA256SUMS
        # Publish a checksum manifest so downloads can be verified
        # (curl | chmod | run otherwise trusts the transport blindly).
        # `tdig-*` deliberately excludes the SHA256SUMS file itself.
        run: |
          shopt -s nullglob
          cd release
          bins=(tdig-*)
          # Refuse to publish an unverifiable release if no binaries were
          # collected (fail loudly instead of a bare literal-glob error).
          if [ "${#bins[@]}" -eq 0 ]; then
            echo "::error::no tdig-* binaries found in release/; refusing to publish"
            exit 1
          fi
          sha256sum "${bins[@]}" | tee SHA256SUMS
          # Sanity check the manifest round-trips before publishing.
          sha256sum -c SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "tdig ${GITHUB_REF_NAME}" \
            --generate-notes \
            release/*
